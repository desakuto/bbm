<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>STRUK BBM</title>

<style>
@font-face{
  font-family:"Avenis";
  src:url("Avenis.ttf") format("truetype");
}

body{
  font-family:Avenis;
  background:#eee;
}

.paper{
  width:220px;
  margin:auto;
  background:#fff;
  padding:14px;
  font-size:14px;
  line-height:1.05;
}

.spbu{
  font-size:18px;
  font-weight:bold;
}

.center{text-align:left;}

.row{
  display:grid;
  grid-template-columns:72px 10px 1fr;
  align-items:center;
  line-height:1;
  margin:0;
}
.row span:first-child{
  white-space:nowrap;
}
.row.info{
  grid-template-columns:72px 12px 22px 1fr;
}

.row.info span:nth-child(3){
  display:none;
}

.left input{
  text-align:left;
}

.right input,
.right select{
  text-align:right;
}

.row.info select{
  grid-column:3 / 5;
  text-align:right;
}

.colon{text-align:center;}
.rp{text-align:right;}
.amount input{
  font-weight:bold;
}
input,select{
  border:none;
  background:transparent;
  font-family:Avenis;
  font-size:14px;
  width:100%;
  text-align:right;
}

select{
  appearance:none;
  -webkit-appearance:none;
  -moz-appearance:none;
}

.datetime{
  display:grid;
  grid-template-columns:1fr 1fr;
  margin-bottom:2px;
}

.datetime input{
  text-align:left;
}

.datetime input:last-child{
  text-align:right;
}

.amount{
  font-weight:bold;
}

button{
  width:220px;
  margin:10px auto;
  display:block;
  padding:6px;
}

@media print{
  body{background:#fff;}
  button{display:none;}
}
</style>
</head>

<body>

<button onclick="window.print()">PRINT</button>

<script>

let now = new Date()

let tanggal =
String(now.getDate()).padStart(2,"0") + "/" +
String(now.getMonth()+1).padStart(2,"0") + "/" +
now.getFullYear()

let jam =
String(now.getHours()).padStart(2,"0") + ":" +
String(now.getMinutes()).padStart(2,"0")

document.getElementById("tanggal").value = tanggal
document.getElementById("jam").value = jam

</script>

</body>

</html>
